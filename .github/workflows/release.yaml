name: Release

on:
  push:
    branches:
      - main

jobs:
  check-version:
    name: Check if version is new
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.check.outputs.should-release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check PyPI for existing version
        id: check
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/kdtree-rs/$VERSION/json")
          if [ "$STATUS" = "404" ]; then
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-release=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.platform }}-${{ matrix.target }})
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04, platform: linux, target: x86_64 }
          - { os: ubuntu-22.04, platform: linux, target: aarch64 }
          - { os: macos-15-intel, platform: macos, target: x86_64 }
          - { os: macos-latest, platform: macos, target: aarch64 }
          - { os: windows-latest, platform: windows, target: x64 }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.13t
            3.14t
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.13t -i python3.14t
          sccache: true
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform }}-${{ matrix.target }}
          path: dist

  sdist:
    name: Build sdist
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist

  pypi:
    name: Publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Smoke test (Linux x86_64 wheel)
        run: |
          uv run --isolated --no-project --python 3.13t \
            --with dist/kdtree_rs-*-cp313-cp313t-manylinux*x86_64*.whl \
            python -c "
          import numpy as np
          from kdtree import KDTree
          data = np.random.default_rng(0).standard_normal((50, 3))
          tree = KDTree(data)
          d, i = tree.query(data[:5], k=3)
          assert d.shape == (5, 3) and i.shape == (5, 3)
          print('smoke test passed')
          "
      - name: Generate attestations
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist/*'
      - name: Publish
        run: uv publish --check-url https://pypi.org/simple/
